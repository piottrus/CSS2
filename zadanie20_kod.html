<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <style> 
        @import url("zadanie20_wrob.css"); 
    </style> 
</head>
<body>
    <div id="jeden">
        <p>P jest kolorem pomarańczowym</p>
        <P>wielkością 20 punktów</P>
        <P>i czcionką Arial</p>
        <p>
    </div>

    <div id="dwa">
        <b><i>I jest pogrubione</i></b>
        <strike>Strike jest przekreślone(Wpisz swój tekst)</strike>
        <u>U ma nadkreślenie(Wpisz swój tekst)</u>
    </div>

    <div id="trzy">
        <h1>Nagłówek poziomu 1. Jest podkreślony (Moj tekst)</h1>
        <ol>
            <li id="li1">Punkt pierwszy moj tekst</li>
            <li id="li2">Punkt drugi moj tekst</li>
            <li id="li3">Punkt trzeci moj tekst</li>
        </ol>
    </div>
</body>
</html>

#jeden{
    background-color: #FFFDD0;
    width: 100%;
    height: 40%;
}
p{
    color: orange;
    font-size: 20pt;
    font-family: arial;
}
#dwa{
    background-color: #ff00ff;
    width: 80%;
    height: 15%;
}
i{
    color: green;
    font-size: 20pt;
    text-decoration: double;
}
strike{
    color: red;
    font-size: 20pt;
}
u{
    color: purple;
    font-size: 20pt;
    text-decoration: overline;
}
#trzy{
    background-color: #C0d727;
    width: 100%;
    height: 30%;
}
h1{
    color: blue;
    font-size: 30pt;
    text-decoration: underline;
}
#li1{
    color: blue;
    font-size: 25pt;
}
#li2{
    color: red;
    font-size: 20pt;
}
#li3{
    color: gray;
    font-size: 15pt;
}

</textarea>


</body>
</html>
