<div id="div1">
    <span id="span1">Znacznik DIV (blok 1)--> Wróbel</span><br>

    <span id="span1.1">
        <b><u> Element blokowy (DIV)</u></b> jest elementem blokowym może zawierać 
        wewnątrz siebie zwykły            tekst, jak również inne elementy blokowe. Został on 
        pomyślany do tworzenia obszerniejszych struktur.     
    </span> 

    <ul id="ul1" type="circle"> 
        <li> div'a powinno się korzystać kiedy potrzebujemy wyodrębnić poszczególne 
        bloki w układzie dokumentu, na przykład lewa kolumna, menu nawigacyjne, stopka. 
        </li> 
        <li>Służy do utworzenia sekcji (bloku) w pliku HTML w celu ich sformatowania za pomocą 
        arkusza stylów CSS.</li> 
    </ul> 
</div>

<div id="div2">
    <span id="span2">Znacznik SPAN (blok 2)--> 06.03.2026, 08:53</span> <br>

    <span id="span2.1">Elementy wyświetlanie w linii (SPAN) jest elementem liniowym nie mogą zawierać 
    elementów blokowych, ale mogą inne elementy wyświetlane w linii oraz zwykły tekst.  </span>

    <ul id="ul2" type="square"> 
        <li>Jeśli chcemy w paragrafie część tekstu wyróżnić czerwonym kolorem, do 
        wyodrębnienia tego tekstu nie możemy użyć elementu div (paragraf <.p>z zasady nie 
        może zawierać elementów blokowych) tylko span. </li> 
        <li>Wewnątrz DIV można oczywiście wpisać również SPAN. </li>
    </ul>
</div>

<div id="div3">
